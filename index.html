<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SoundAlike — Find Similar Songs</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --bg1: #0a0c14;
  --bg2: #0f1220;
  --glass-bg: rgba(255,255,255,0.04);
  --glass-bg2: rgba(255,255,255,0.07);
  --glass-border: rgba(255,255,255,0.09);
  --glass-border2: rgba(255,255,255,0.14);
  --glass-shadow: 0 8px 32px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.07);
  --glass-shadow2: 0 16px 48px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.1);
  --accent: #8b7cf8;
  --accent2: #c084fc;
  --accent-glow: rgba(139,124,248,0.25);
  --pink: #f472b6;
  --teal: #2dd4bf;
  --text: #f0f2ff;
  --text2: #9499b8;
  --text3: #4d5270;
  --match-high: #4ade80;
  --match-mid: #facc15;
  --match-low: #fb923c;
}

body {
  font-family: 'Manrope', sans-serif;
  background: var(--bg1);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── ANIMATED BACKGROUND ── */
.bg-wrap {
  position: fixed;
  inset: 0;
  z-index: 0;
  overflow: hidden;
}
.bg-orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0.5;
  animation: drift 14s ease-in-out infinite alternate;
}
.bg-orb.o1 { width:600px;height:500px;top:-200px;left:-100px;background:radial-gradient(circle,rgba(139,124,248,0.3),transparent 70%);animation-duration:16s; }
.bg-orb.o2 { width:400px;height:400px;bottom:-100px;right:-100px;background:radial-gradient(circle,rgba(244,114,182,0.2),transparent 70%);animation-duration:12s;animation-direction:alternate-reverse; }
.bg-orb.o3 { width:300px;height:300px;top:50%;left:60%;background:radial-gradient(circle,rgba(45,212,191,0.15),transparent 70%);animation-duration:18s; }
@keyframes drift { 0%{transform:translate(0,0) scale(1)} 100%{transform:translate(30px,20px) scale(1.08)} }

/* Noise texture */
.bg-wrap::after {
  content:'';
  position:absolute;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:180px;
  opacity:0.025;
  pointer-events:none;
}

/* ── LAYOUT ── */
.page {
  position: relative;
  z-index: 1;
  max-width: 780px;
  margin: 0 auto;
  padding: 0 20px 100px;
}

/* ── HERO ── */
.hero {
  padding: 68px 0 52px;
  text-align: center;
}

.logo-row {
  display: inline-flex;
  align-items: center;
  gap: 9px;
  background: var(--glass-bg);
  border: 1px solid var(--glass-border2);
  border-radius: 100px;
  padding: 7px 16px;
  margin-bottom: 32px;
  backdrop-filter: blur(12px);
}
.logo-pulse {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 10px var(--accent);
  animation: pulse 2.2s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.8)} }
.logo-text {
  font-size: 11px; font-weight: 800;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--text2);
}

.hero h1 {
  font-size: clamp(2.1rem, 6vw, 3.8rem);
  font-weight: 900;
  line-height: 1.07;
  letter-spacing: -0.04em;
  margin-bottom: 18px;
}
.hero h1 .grad {
  background: linear-gradient(135deg, var(--accent), var(--pink));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.hero-sub {
  font-size: 15px; font-weight: 400;
  color: var(--text2); line-height: 1.7;
  max-width: 420px; margin: 0 auto 44px;
}

/* ── SEARCH ── */
.search-glass {
  max-width: 620px;
  margin: 0 auto;
  background: var(--glass-bg2);
  border: 1px solid var(--glass-border2);
  border-radius: 20px;
  backdrop-filter: blur(24px) saturate(180%);
  -webkit-backdrop-filter: blur(24px) saturate(180%);
  box-shadow: var(--glass-shadow2);
  display: flex;
  align-items: center;
  transition: border-color 0.25s, box-shadow 0.25s;
  overflow: hidden;
}
.search-glass:focus-within {
  border-color: rgba(139,124,248,0.5);
  box-shadow: 0 0 0 4px rgba(139,124,248,0.12), var(--glass-shadow2);
}
.search-ic { padding: 0 14px 0 20px; color: var(--text3); display:flex; flex-shrink:0; }
.search-input {
  flex:1; background:none; border:none; outline:none;
  font-family:'Manrope',sans-serif; font-size:15px; font-weight:500;
  color:var(--text); padding:18px 0;
}
.search-input::placeholder { color: var(--text3); }
.search-btn {
  margin:18px; margin-right: 20px; padding:9px 12px; border-radius:9px; border:none;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color:#fff; font-family:'Manrope',sans-serif; font-size:13px; font-weight:800;
  letter-spacing:0.04em; cursor:pointer;
  box-shadow: 0 4px 20px rgba(139,124,248,0.4);
  transition: opacity 0.18s, transform 0.15s, box-shadow 0.2s;
  white-space:nowrap;
}
.search-btn:hover { opacity:0.88; transform:scale(1.03); box-shadow:0 6px 28px rgba(139,124,248,0.5); }
.search-btn:active { transform:scale(0.97); }
.search-hint { margin-top:11px; font-size:12px; color:var(--text3); font-weight:500; text-align:center; }
.search-hint kbd {
  background:var(--glass-bg); border:1px solid var(--glass-border2);
  border-radius:5px; padding:1px 6px; font-family:'Manrope',sans-serif; font-size:11px;
}

/* ── RESULTS ── */
#results { margin-top: 52px; }

/* Now playing banner */
.now-banner {
  display:flex; align-items:center; gap:14px;
  background: var(--glass-bg2);
  border: 1px solid var(--glass-border2);
  border-radius: 18px;
  padding: 16px 20px;
  margin-bottom: 28px;
  backdrop-filter: blur(20px) saturate(160%);
  -webkit-backdrop-filter: blur(20px) saturate(160%);
  box-shadow: var(--glass-shadow);
  animation: fadeUp 0.4s cubic-bezier(.22,1,.36,1);
}
.now-art {
  width:48px; height:48px; border-radius:10px;
  background:var(--glass-bg2); border:1px solid var(--glass-border2);
  flex-shrink:0; overflow:hidden; display:flex; align-items:center; justify-content:center;
  font-size:20px; font-weight:800; color:var(--text2);
}
.now-art img { width:100%; height:100%; object-fit:cover; }
.now-info { flex:1; min-width:0; }
.now-label { font-size:10px; font-weight:800; letter-spacing:0.12em; text-transform:uppercase; color:var(--accent); margin-bottom:3px; }
.now-name { font-size:15px; font-weight:800; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.now-artist { font-size:12px; color:var(--text2); margin-top:2px; }
.eq { display:flex; align-items:flex-end; gap:2.5px; height:22px; flex-shrink:0; }
.eq span { width:3px; border-radius:2px; background:var(--accent); animation:eqAnim 1.1s ease-in-out infinite; }
.eq span:nth-child(1){animation-duration:.85s}
.eq span:nth-child(2){animation-delay:.18s;animation-duration:1.1s}
.eq span:nth-child(3){animation-delay:.08s;animation-duration:.7s}
.eq span:nth-child(4){animation-delay:.25s;animation-duration:.95s}
@keyframes eqAnim { 0%,100%{height:4px;opacity:.35} 50%{height:20px;opacity:1} }

/* Genre tags */
.genre-strip { display:flex; flex-wrap:wrap; gap:7px; margin-bottom:26px; }
.genre-pill {
  font-size:11px; font-weight:700; padding:5px 12px; border-radius:8px;
  background:var(--glass-bg); border:1px solid var(--glass-border2);
  color:var(--text2); letter-spacing:.04em; text-transform:capitalize;
  backdrop-filter:blur(8px);
}

/* Section header */
.sec-head { display:flex; align-items:center; gap:12px; margin-bottom:16px; }
.sec-line { flex:1; height:1px; background:var(--glass-border); }
.sec-label { font-size:10px; font-weight:800; letter-spacing:.14em; text-transform:uppercase; color:var(--text3); white-space:nowrap; }
.sec-count {
  font-size:11px; font-weight:700; color:var(--text3);
  background:var(--glass-bg); border:1px solid var(--glass-border2);
  padding:2px 9px; border-radius:20px;
}

/* ── SONG CARD ── */
.song-list { display:flex; flex-direction:column; gap:8px; }

.song-card {
  background: var(--glass-bg);
  border: 1px solid var(--glass-border);
  border-radius: 16px;
  backdrop-filter: blur(16px) saturate(150%);
  -webkit-backdrop-filter: blur(16px) saturate(150%);
  box-shadow: var(--glass-shadow);
  overflow: hidden;
  animation: fadeUp 0.4s cubic-bezier(.22,1,.36,1) both;
  transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
}
.song-card:hover {
  border-color: var(--glass-border2);
  box-shadow: -2px 0 0 var(--accent), var(--glass-shadow2);
  transform: translateX(3px);
}
@keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }

.card-main {
  display:flex; align-items:center; gap:12px;
  padding:13px 15px;
  cursor:pointer;
}

.card-num { font-size:12px; font-weight:700; color:var(--text3); width:20px; text-align:center; flex-shrink:0; }

.card-art {
  width:50px; height:50px; border-radius:10px;
  background: linear-gradient(135deg, rgba(139,124,248,0.2), rgba(244,114,182,0.2));
  border:1px solid var(--glass-border2); flex-shrink:0;
  overflow:hidden; display:flex; align-items:center; justify-content:center;
  font-size:18px; font-weight:800; color:var(--text2);
  position:relative;
}
.card-art img { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }

.card-body { flex:1; min-width:0; }
.card-title { font-size:14px; font-weight:700; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:3px; }
.card-artist { font-size:12px; color:var(--text2); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

.card-right { display:flex; align-items:center; gap:10px; flex-shrink:0; }

.match-badge {
  font-size:11px; font-weight:800; padding:3px 9px; border-radius:20px;
  letter-spacing:.02em;
}
.match-high { background:rgba(74,222,128,0.12); color:var(--match-high); border:1px solid rgba(74,222,128,0.25); }
.match-mid  { background:rgba(250,204,21,0.12); color:var(--match-mid);  border:1px solid rgba(250,204,21,0.25); }
.match-low  { background:rgba(251,146,60,0.12); color:var(--match-low);  border:1px solid rgba(251,146,60,0.25); }
.match-none { background:var(--glass-bg); color:var(--text3); border:1px solid var(--glass-border2); }

.expand-btn {
  width:30px; height:30px; border-radius:8px;
  background:var(--glass-bg2); border:1px solid var(--glass-border2);
  display:flex; align-items:center; justify-content:center; cursor:pointer;
  transition:background 0.2s, transform 0.25s;
  color:var(--text3); flex-shrink:0;
}
.expand-btn:hover { background:rgba(139,124,248,0.15); color:var(--accent); }
.expand-btn.open { transform:rotate(180deg); color:var(--accent); background:rgba(139,124,248,0.12); }

/* Platform links panel */
.platform-row {
  display:flex; align-items:center; gap:8px;
  padding:0 15px 13px 57px;
  flex-wrap:wrap;
}
.platform-link {
  display:inline-flex; align-items:center; gap:6px;
  padding:6px 12px; border-radius:10px; text-decoration:none;
  font-size:11px; font-weight:700; letter-spacing:.03em;
  border:1px solid var(--glass-border2);
  background:var(--glass-bg2); backdrop-filter:blur(8px);
  color:var(--text2); transition:all 0.18s;
  white-space:nowrap;
}
.platform-link:hover { transform:translateY(-1px); border-color:rgba(255,255,255,0.2); color:var(--text); }
.platform-link svg, .platform-link img { flex-shrink:0; }
.pl-spotify:hover { background:rgba(30,215,96,0.12); border-color:rgba(30,215,96,0.3); color:#1ED760; }
.pl-youtube:hover { background:rgba(255,0,0,0.1); border-color:rgba(255,0,0,0.25); color:#FF4444; }
.pl-apple:hover { background:rgba(252,60,68,0.1); border-color:rgba(252,60,68,0.25); color:#FC3C44; }
.pl-deezer:hover { background:rgba(164,0,255,0.1); border-color:rgba(164,0,255,0.25); color:#A400FF; }
.pl-amazon:hover { background:rgba(255,153,0,0.1); border-color:rgba(255,153,0,0.25); color:#FF9900; }

/* Expand panel — nested similar songs */
.expand-panel {
  display:none;
  border-top:1px solid var(--glass-border);
  background:rgba(0,0,0,0.15);
  padding:14px 15px;
}
.expand-panel.open { display:block; }
.expand-inner-label {
  font-size:10px; font-weight:800; letter-spacing:.12em; text-transform:uppercase;
  color:var(--accent); margin-bottom:12px;
  display:flex; align-items:center; gap:8px;
}
.expand-inner-label::after { content:''; flex:1; height:1px; background:rgba(139,124,248,0.2); }

.nested-list { display:flex; flex-direction:column; gap:6px; }
.nested-card {
  display:flex; align-items:center; gap:10px;
  padding:10px 12px;
  background:var(--glass-bg); border:1px solid var(--glass-border);
  border-radius:12px; cursor:pointer;
  transition:all 0.18s;
}
.nested-card:hover { background:var(--glass-bg2); border-color:var(--glass-border2); transform:translateX(2px); }
.nested-art {
  width:38px; height:38px; border-radius:8px; flex-shrink:0;
  background:linear-gradient(135deg,rgba(139,124,248,0.15),rgba(244,114,182,0.15));
  border:1px solid var(--glass-border2); overflow:hidden;
  display:flex; align-items:center; justify-content:center;
  font-size:14px; font-weight:800; color:var(--text2); position:relative;
}
.nested-art img { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
.nested-info { flex:1; min-width:0; }
.nested-title { font-size:13px; font-weight:700; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.nested-artist { font-size:11px; color:var(--text2); }
.nested-right { display:flex; align-items:center; gap:7px; flex-shrink:0; }
.nested-match { font-size:10px; font-weight:800; padding:2px 7px; border-radius:20px; }
.nested-platforms { display:flex; gap:5px; }
.np-icon {
  width:26px; height:26px; border-radius:7px;
  display:flex; align-items:center; justify-content:center;
  background:var(--glass-bg2); border:1px solid var(--glass-border2);
  text-decoration:none; transition:all 0.18s; color:var(--text3);
}
.np-icon:hover { transform:scale(1.15); border-color:rgba(255,255,255,0.2); color:var(--text); }
.np-icon.spotify:hover { background:rgba(30,215,96,0.15); color:#1ED760; }
.np-icon.youtube:hover { background:rgba(255,0,0,0.12); color:#FF4444; }
.np-icon.apple:hover { background:rgba(252,60,68,0.12); color:#FC3C44; }

.nested-loading {
  text-align:center; padding:24px; color:var(--text3);
  font-size:13px; font-weight:500;
  display:flex; align-items:center; justify-content:center; gap:10px;
}
.mini-spinner {
  width:18px; height:18px; border-radius:50%;
  border:2px solid var(--glass-border2);
  border-top-color:var(--accent);
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* Loading */
.loading { display:flex; flex-direction:column; align-items:center; gap:18px; padding:72px 0; }
.loader-ring {
  width:54px; height:54px; position:relative;
}
.loader-ring::before, .loader-ring::after {
  content:''; position:absolute; inset:0; border-radius:50%;
  border:2px solid transparent;
}
.loader-ring::before { border-top-color:var(--accent); animation:spin .9s linear infinite; }
.loader-ring::after { inset:9px; border-top-color:var(--pink); animation:spin 1.4s linear infinite reverse; }
.loading-text { font-size:13px; color:var(--text2); font-weight:500; }

/* Empty */
.empty { text-align:center; padding:72px 16px; }
.empty-emoji { font-size:54px; margin-bottom:18px; }
.empty-title { font-size:20px; font-weight:800; margin-bottom:8px; }
.empty-body { font-size:14px; color:var(--text2); line-height:1.65; }

::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--glass-border2);border-radius:3px}
</style>
</head>
<body>

<div class="bg-wrap">
  <div class="bg-orb o1"></div>
  <div class="bg-orb o2"></div>
  <div class="bg-orb o3"></div>
</div>

<div class="page">
  <div class="hero">
    <div class="logo-row"><div class="logo-pulse"></div><span class="logo-text">SoundAlike</span></div>
    <h1>Type a song.<br>Find what <span class="grad">sounds like it.</span></h1>
    <p class="hero-sub">Search any song and discover tracks that match its genre, mood & sound. Click any result to explore further.</p>

    <div class="search-glass">
      <div class="search-ic">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </div>
      <input class="search-input" id="searchInput" type="text" placeholder="e.g. Co2, Tonight, Ghar,..." autocomplete="off" onkeydown="if(event.key==='Enter')doSearch()">
      <button class="search-btn" onclick="doSearch()">Find Similar</button>
    </div>
    <p class="search-hint">Press <kbd>Enter</kbd> or click the button</p>
  </div>

  <div id="results"></div>
</div>

<script>
const LFKEY = 'b25b959554ed76058ac220b7b2e0a026';
const LF = 'https://ws.audioscrobbler.com/2.0/';

// ── API helpers ──────────────────────────────────────────────────────────────
async function lfm(method, params) {
  const u = new URL(LF);
  u.search = new URLSearchParams({ method, api_key: LFKEY, format: 'json', ...params });
  const r = await fetch(u.toString());
  if (!r.ok) throw new Error('HTTP ' + r.status);
  return r.json();
}

function arr(x) { if (!x) return []; return Array.isArray(x) ? x : [x]; }

// ── SEARCH ───────────────────────────────────────────────────────────────────
async function doSearch() {
  const q = document.getElementById('searchInput').value.trim();
  if (!q) return;
  showLoading('Searching for "' + esc(q) + '"…');

  try {
    const sd = await lfm('track.search', { track: q, limit: 5 });
    const matches = arr(sd?.results?.trackmatches?.track);
    if (!matches.length || !matches[0].name) return showEmpty('🎵','No song found',`Couldn't find "<strong>${esc(q)}</strong>". Try another spelling or title.`);

    const t = matches[0];
    const trackName = t.name, artistName = t.artist;
    showLoading(`Found <strong>${esc(trackName)}</strong> — fetching similar tracks…`);

    const [simD, tagD] = await Promise.all([
      lfm('track.getSimilar', { track:trackName, artist:artistName, limit:30, autocorrect:1 }),
      lfm('track.getTopTags', { track:trackName, artist:artistName, autocorrect:1 })
    ]);

    const similar = arr(simD?.similartracks?.track);
    const tags = arr(tagD?.toptags?.tag).slice(0,7).map(x=>x.name).filter(x=>x&&x.length<24&&x.toLowerCase()!=='seen live');

    // Fetch album art for the main track
    const mainArt = await getTrackArt(trackName, artistName);

    if (similar.length > 0) return renderResults(trackName, artistName, mainArt, similar, tags);

    // Fallback via similar artists
    showLoading('Finding songs with similar mood & genre…');
    const fb = await artistFallback(artistName);
    if (fb.length) return renderResults(trackName, artistName, mainArt, fb, tags);

    showEmpty('🎼','No similar songs found',`Found <strong>${esc(trackName)}</strong> but no similar tracks available. Try a more popular song.`);
  } catch(e) {
    showEmpty('⚠️','Connection error','Could not reach the music database. Please check your connection and try again.');
  }
}

async function getTrackArt(track, artist) {
  try {
    const d = await lfm('track.getInfo', { track, artist, autocorrect:1 });
    const imgs = arr(d?.track?.album?.image);
    return imgs.find(i=>i.size==='large')?.['#text'] || imgs.find(i=>i.size==='medium')?.['#text'] || '';
  } catch { return ''; }
}

async function artistFallback(artistName) {
  try {
    const r = await lfm('artist.getSimilar', { artist:artistName, limit:6 });
    const simA = arr(r?.similarartists?.artist).slice(0,5).map(a=>a.name);
    const ps = simA.map(n=>lfm('artist.getTopTracks',{artist:n,limit:4}).then(r=>arr(r?.toptracks?.track).map(t=>({...t,artist:{name:n}}))).catch(()=>[]));
    const res = await Promise.all(ps);
    return res.flat();
  } catch { return []; }
}

// ── Platform link generators ─────────────────────────────────────────────────
function spotifySearch(t,a) { return `https://open.spotify.com/search/${encodeURIComponent(t+' '+a)}`; }
function youtubeSearch(t,a) { return `https://www.youtube.com/results?search_query=${encodeURIComponent(t+' '+a)}`; }
function appleSearch(t,a)   { return `https://music.apple.com/search?term=${encodeURIComponent(t+' '+a)}`; }
function deezerSearch(t,a)  { return `https://www.deezer.com/search/${encodeURIComponent(t+' '+a)}`; }
function amazonSearch(t,a)  { return `https://music.amazon.com/search/${encodeURIComponent(t+' '+a)}`; }

function matchBadge(match) {
  if (match === null) return `<span class="match-badge match-none">Similar</span>`;
  const pct = Math.round(match * 100);
  const cls = pct >= 70 ? 'match-high' : pct >= 40 ? 'match-mid' : 'match-low';
  return `<span class="match-badge ${cls}">${pct}% match</span>`;
}

function imgEl(src, fallback) {
  if (!src) return `<span>${esc(fallback)}</span>`;
  return `<img src="${esc(src)}" alt="" loading="lazy" onerror="this.style.display='none'"><span style="display:none">${esc(fallback)}</span>`;
}

// ── RENDER MAIN RESULTS ──────────────────────────────────────────────────────
function renderResults(trackName, artistName, mainArt, similar, tags) {
  const shown = similar.slice(0, 20);

  const tagsHtml = tags.length
    ? `<div class="genre-strip">${tags.map(t=>`<span class="genre-pill">${esc(t)}</span>`).join('')}</div>` : '';

  const cardsHtml = shown.map((s, i) => {
    const name   = s.name || 'Unknown';
    const artist = typeof s.artist === 'string' ? s.artist : (s.artist?.name || 'Unknown');
    const imgs   = arr(s.image);
    const img    = imgs.find(x=>x.size==='medium')?.['#text'] || '';
    const match  = s.match !== undefined ? parseFloat(s.match) : null;
    const firstLetter = name.charAt(0).toUpperCase();
    const cardId = `card-${i}`;

    return `
    <div class="song-card" style="animation-delay:${i*0.045}s" id="${cardId}">
      <div class="card-main" onclick="toggleExpand('${cardId}')">
        <span class="card-num">${i+1}</span>
        <div class="card-art">${imgEl(img, firstLetter)}</div>
        <div class="card-body">
          <div class="card-title">${esc(name)}</div>
          <div class="card-artist">${esc(artist)}</div>
        </div>
        <div class="card-right">
          ${matchBadge(match)}
          <div class="expand-btn" id="btn-${cardId}" title="Show similar & listen">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M6 9l6 6 6-6"/></svg>
          </div>
        </div>
      </div>
      <div class="platform-row" id="plat-${cardId}" style="display:none">
        ${platformLinks(name, artist)}
      </div>
      <div class="expand-panel" id="panel-${cardId}">
        <div class="expand-inner-label">Similar to this song</div>
        <div class="nested-list" id="nested-${cardId}">
          <div class="nested-loading"><div class="mini-spinner"></div> Loading similar tracks…</div>
        </div>
      </div>
    </div>`;
  }).join('');

  document.getElementById('results').innerHTML = `
    <div class="now-banner">
      <div class="now-art">${mainArt ? `<img src="${esc(mainArt)}" alt="">` : '🎧'}</div>
      <div class="now-info">
        <div class="now-label">Showing songs similar to</div>
        <div class="now-name">${esc(trackName)}</div>
        <div class="now-artist">${esc(artistName)}</div>
      </div>
      <div class="eq"><span></span><span></span><span></span><span></span></div>
    </div>
    ${tagsHtml}
    <div class="sec-head">
      <div class="sec-line"></div>
      <span class="sec-label">Similar Songs</span>
      <span class="sec-count">${shown.length} tracks</span>
      <div class="sec-line"></div>
    </div>
    <div class="song-list">${cardsHtml}</div>`;
}

// ── EXPAND / COLLAPSE ────────────────────────────────────────────────────────
const expandedCards = new Set();
const loadedNested = new Map();

async function toggleExpand(cardId) {
  const panel   = document.getElementById('panel-' + cardId);
  const btn     = document.getElementById('btn-' + cardId);
  const platRow = document.getElementById('plat-' + cardId);
  const isOpen  = expandedCards.has(cardId);

  if (isOpen) {
    panel.classList.remove('open');
    btn.classList.remove('open');
    platRow.style.display = 'none';
    expandedCards.delete(cardId);
  } else {
    panel.classList.add('open');
    btn.classList.add('open');
    platRow.style.display = 'flex';
    expandedCards.add(cardId);

    if (!loadedNested.has(cardId)) {
      await loadNested(cardId);
    }
  }
}

async function loadNested(cardId) {
  // Extract track info from the card
  const card = document.getElementById(cardId);
  const title  = card.querySelector('.card-title')?.textContent  || '';
  const artist = card.querySelector('.card-artist')?.textContent || '';
  const nestedEl = document.getElementById('nested-' + cardId);

  loadedNested.set(cardId, true);

  try {
    const [simD, tagD] = await Promise.all([
      lfm('track.getSimilar', { track:title, artist:artist, limit:6, autocorrect:1 }),
      lfm('track.getTopTags', { track:title, artist:artist, autocorrect:1 })
    ]);

    const sims = arr(simD?.similartracks?.track).slice(0,6);
    const tags = arr(tagD?.toptags?.tag).slice(0,2).map(x=>x.name).filter(x=>x&&x.length<20&&x.toLowerCase()!=='seen live');

    if (!sims.length) {
      nestedEl.innerHTML = `<div class="nested-loading">No similar tracks found for this song.</div>`;
      return;
    }

    // Fetch album arts in parallel (best effort)
    const artPromises = sims.map(s => {
      const sName   = s.name || '';
      const sArtist = typeof s.artist === 'string' ? s.artist : (s.artist?.name || '');
      const imgs = arr(s.image);
      const img = imgs.find(x=>x.size==='medium')?.['#text'] || '';
      return Promise.resolve(img);
    });
    const arts = await Promise.all(artPromises);

    const tagPill = tags[0] ? `<span class="match-badge match-none" style="font-size:9px;padding:2px 7px">${esc(tags[0])}</span>` : '';

    nestedEl.innerHTML = sims.map((s, i) => {
      const sName   = s.name || 'Unknown';
      const sArtist = typeof s.artist === 'string' ? s.artist : (s.artist?.name || 'Unknown');
      const art     = arts[i];
      const match   = s.match !== undefined ? parseFloat(s.match) : null;
      const matchPct = match !== null ? Math.round(match * 100) : null;
      const matchCls = matchPct !== null ? (matchPct>=70?'match-high':matchPct>=40?'match-mid':'match-low') : 'match-none';
      const matchStr = matchPct !== null ? matchPct + '%' : 'Similar';

      return `
      <div class="nested-card">
        <div class="nested-art">${imgEl(art, sName.charAt(0).toUpperCase())}</div>
        <div class="nested-info">
          <div class="nested-title">${esc(sName)}</div>
          <div class="nested-artist">${esc(sArtist)}</div>
        </div>
        <div class="nested-right">
          <span class="nested-match match-badge ${matchCls}">${matchStr}</span>
          <div class="nested-platforms">
            ${platformLinks(sName, sArtist, true)}
          </div>
        </div>
      </div>`;
    }).join('');

  } catch(e) {
    document.getElementById('nested-' + cardId).innerHTML = `<div class="nested-loading">Could not load similar tracks.</div>`;
  }
}

// ── UI states ────────────────────────────────────────────────────────────────
function showLoading(msg) {
  document.getElementById('results').innerHTML = `
    <div class="loading">
      <div class="loader-ring"></div>
      <div class="loading-text">${msg}</div>
    </div>`;
}

function showEmpty(emoji, title, body) {
  document.getElementById('results').innerHTML = `
    <div class="empty">
      <div class="empty-emoji">${emoji}</div>
      <div class="empty-title">${title}</div>
      <div class="empty-body">${body}</div>
    </div>`;
}

function esc(s) {
  return String(s ?? '').replace(/[&<>"']/g, c =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
</script>
